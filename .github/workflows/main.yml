name: Build and Deploy Icon Library

on:
  push:
    branches: [main, master]
    paths:
      - 'icons/**'
      - 'scripts/**'
      - 'templates/**'
      - 'package.json'
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: '跳过拉取，只重新构建'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest icons
        if: ${{ !inputs.skip_fetch }}
        run: npm run fetch
        timeout-minutes: 10

      - name: Optimize SVGs
        run: npm run optimize

      - name: Build SVG Sprite
        run: npm run sprite

      - name: Build Icon Font
        run: npm run font

      - name: Build preview page
        run: npm run preview

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
